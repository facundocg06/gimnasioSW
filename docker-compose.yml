services:
  postgres:
    image: postgres:16-alpine
    container_name: gimnasio_postgres
    restart: always
    environment:
      POSTGRES_DB: gimnasio
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gimnasio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gimnasio_network

  backend:
    build:
      context: ./gimnasio_back
    container_name: gimnasio_backend
    restart: always
    env_file:
      - ./gimnasio_back/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - gimnasio_network
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./gimnasio_front
    container_name: gimnasio_frontend
    restart: always
    # Expone los archivos estáticos via volumen compartido con nginx
    volumes:
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - gimnasio_network

  nginx:
    image: nginx:alpine
    container_name: gimnasio_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gimnasio_network

networks:
  gimnasio_network:
    driver: bridge

volumes:
  postgres_data:
  frontend_dist:
